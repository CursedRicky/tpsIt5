<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contratto</title>
</head>
<style>
    ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #333333;
    }

    ul li {
        float: left;
    }

    ul li a {
        display: block;
        color: white;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
    }

    ul li a:hover {
        background-color: #111111;
    }
</style>
<body>
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/chi-siamo">Chi Siamo</a></li>
        <li><a href="/cosa-facciamo">Cosa Facciamo</a></li>
        <li><a href="/modulo">Modulo</a></li>
    </ul>
    <h1>Lavora con noi!</h1>
    Avanti non perder tempo, firma qua
    è un normale contratto è una formalità. <br>

    <form action="">
        <label>Nome</label> <br>
        <input type="text" name="" id=""> <br>
        <label>Cognome</label> <br>
        <input type="text" name="" id=""> <br>
        <label>Concedi al Gatto e alla Volpe tutti i diritti?</label> <br>
        <input type="checkbox" name="" id=""> <br>
        <input type="submit" value="Firma">
    </form>

    <br>
    Tu ci cedi tutti i diritti
    e noi faremo di te
    un divo da hit parade!...
</body>
</html>
